tags:
- name: ensemble
  description: Un ensemble dans Orfeo représente soit un ensemble ou groupe musical
    ou un artiste solo.Il s'agit de l'entité sur scène, qui n'est nécessairement une
    personne physique.
- name: entitycontactinfo
  description: Décrit une information de contact associée soit à une entité (personne
    ou structure),soit à une relation entre deux entités. Une information de contact
    peut être une adresse e-mail ou un numéro de téléphone, et des règles de validation
    minimales sont en place pour s'assurer que ce ne soit pas du texte libre.
- name: structureperson
  description: Décrit une relation entre une structure morale et une personne physique.
    Celle-ci est complétée avec des informations de contact, aussi appelées « coordonnées
    professionnelles », où l'adresse e-mail/numéro de téléphone de la personne est
    liée à son activité dans la structure.
- name: project
  description: |-
    Les projets sont la brique principale d'Orfeo et décrit un événement temporel entre un producteur et un organisateur. Le projet possède des informations généréales sur les parties prenantes et la date et se base ensemble sur un ensemble de sous-objets pour gérer le contrat de vente, la distribution, le planning, etc.
    En vue liste, la vue retourne un nombre restreint de champs par rapport au requêtage d'un projet individuel.
