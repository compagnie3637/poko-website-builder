          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedActivityStatus'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedActivityStatus'
      security:
      - tokenAuth: []
