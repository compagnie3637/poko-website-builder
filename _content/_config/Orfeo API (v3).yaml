        on `hide_to_artists` attribute.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this statut des éléments de
          planning.
        required: true
      tags:
      - activity_status
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/activity_sub_type/:
    get:
      operationId: List activity_sub_type
      description: |-
        Activity subtype may be used to refine the type of an event. It must be associated to a main type
        of Orfeo (performance, rehearsal, technical, accommodation, journey, meal, other), since this
        principal type is used to customize the information display to the user.
      parameters:
      - in: query
        name: activity_type
        schema:
          type: string
          x-spec-enum-id: 69d7448710e8ff6d
          title: Type d'élément de planning
          enum:
          - accommodation
          - journey
          - meal
          - other
          - performance
          - rehearsal
          - technical
        description: |-
          * `performance` - Représentation
          * `rehearsal` - Répétition
          * `technical` - Technique
          * `journey` - Voyage
          * `accommodation` - Hébergement
          * `meal` - Repas
          * `other` - Autre
      - in: query
        name: created_by
        schema:
          type: integer
        description: Filtre les résultats créés correspondant à l'identifiant (PK)
          de l'utilisateur
      - in: query
        name: creation_date
        schema:
          type: string
          format: date
        description: Filtre les résultats créés exactement à cette date
      - in: query
