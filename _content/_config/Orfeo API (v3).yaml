openapi: 3.0.3
info:
  title: Orfeo API
  version: v3
  description: |
    ## Authentification

    <p>
      L'API d'Orfeo est disponible pour toute organisation inscrite sur l'application. Pour y accéder, chaque organisation peut générer des clés d'API secrètes. Ces clé sont gérées via <a href="/accounts/my-organization/api/">la page « API &amp; webhooks »</a> dans les paramètres de l'application.<br />
      Tous les appels à l'API nécessitent une clé, qui doit être fournit dans les en-têtes HTTP de la requête. Voici un exemple à l'aide d'une requête cURL :
    </p>
    <pre>$ curl -i GET https://orfeoapp.com/api/ -H "Authorization: Token mytoken123" </pre>

    ## Informations générales

    ### Format

    <p>Les données retournées par les requêtes sont au format JSON, dans le cas où il n'y a pas d'erreurs. Le format JSON est le suivant :</p>

    <pre>{
    "count": 120,
    "next": "https://orfeoapp.com/api/project/?page=2",
    "previous": null,
    "results": [
      {
        "pk": 1,
        "spectacle": "Tournée mondiale",
        "title": "Concert à Paris",
        "start_date": "2019-03-01",
        "end_date": "2019-03-02",
        "status": {
          "pk": 634,
          "name": "À confirmer"
        },
        "venue": "La Cigale",
        "custom_fields": {}
      },
      ...
    ]
    }</pre>
    <p>
      La clé <code>count</code> correspond au nombre total d'objets retournés. <code>next</code> et <code>previous</code> désignent respectivement les liens des pages suivantes et précédentes du résultat de la requête.
    </p>

    <p>
      Le format de données peut varier entre la vue liste (par exemple <code>/api/structure/</code>) et la vue d'un objet précis (<code>/api/structure/123/</code>), cette dernière pouvant être plus complète : pour des raisons de performances, l'ensemble des champs n'est pas inclus dans les listes.<br />
      Chaque objet possède une clé primaire <code>pk</code> (<em>primary key</em>) permettant de référencer cet objet comme clé étrangère dans les autres modèles de données.
    </p>

    ### Filtres

    <p>
      Il est possible d'appliquer des filtres sur les données stockées sur Orfeo que vous souhaitez obtenir. Par exemple pour extraire tous les artistes d'une certaine catégorie, la requête est la suivante :
    </p>

    <pre>$ curl -i GET https://orfeoapp.com/api/artist/?entity_category=&lt;valeur&gt; -H "Authorization: Token mytoken123" </pre>

    <p>
      Les filtres sont applicables sur les champs personnalisés, qui sont initialisés dans l'onglet Paramètres d'Orfeo. L'ensemble des champs personnalisés de votre organisation peuvent être récupérés grâce à la requête
    </p>

    <pre>$ curl -i GET https://orfeoapp.com/api/custom_field/ -H "Authorization: Token mytoken123" </pre>

    <p>
      Chacun des objets retournés possède un champ <code>key</code> qui représente la référence de votre champ. Il est possible de filtrer par champ personnalisé sur vos objets avec la syntaxe <code>custom_fields=key:valeur</code> :
    </p>
    <pre>$ curl -i GET https://orfeoapp.com/api/artist/?custom_fields=&lt;clé&gt;:&lt;valeur&gt; -H "Authorization: Token mytoken123" </pre>

    <p>
      Pour les champs personnalisés de type <code>bool</code>, la valeur doit être <code>true</code> ou <code>false</code>. Pour les champs de type <code>choices</code>, toutes les entrées contenant la <code>valeur</code> demandée seront retournées.
    </p>

    ### Pagination

    <p>
      Le paramètre <code>page_size</code> peut être utilisé afin de préciser le nombre d'éléments que vous souhaitez par page. La requête nécessaire est alors :
    </p>
    <pre>$ curl -i GET https://orfeoapp.com/api/artist/?page_size=&lt;nombre&gt; -H "Authorization: Token mytoken123" </pre>

    ### Limite de requête

    <p>
      Afin de pouvoir fournir une réponse rapide et stable de notre serveur, l'API limite le nombre de requêtes à 10 par seconde par compte. Dans le cas où le nombre est dépassé, le code d'erreur <em>HTTP 429 Too Many Requests</em> est retourné.
    </p>

    ## Pour commencer

    <p>
      Il peut être intéressant dans un premier temps de lister vos dates à venir. Pour cela, il suffit d'utiliser la requête :
    </p>
    <pre>$ curl -i GET https://orfeoapp.com/api/project/?start_date=2026-06-01 -H "Authorization: Token mytoken123"</pre>

    <p>
        Ensuite, vous pouvez retrouver l'ensemble des évenements de votre planning d'un certain type, comme ici les événements de type Réprésentation :
    </p>
    <pre>$ curl -i GET https://orfeoapp.com/api/planning_event/?activity_type=1275 -H "Authorization: Token mytoken123" </pre>
    <p>
        Il est possible de combiner plusieurs filtres : la même requête avec <code>?activity_type=1275&project=1243</code> affichera ainsi l'ensemble des activités dont l'ID du type est 1275 pour le projet n°1243.
    </p>

    ## Webhooks

    <p>
        Les webhooks permettent à votre application d'être notifié lorsque certains événements surviennent sur Orfeo.<br />
        Vous pouvez par exemple configurer un webhook pour être informé du changement de statut d'un de vos contrats. Dans ce cas, Orfeo réalisera une requête POST à l'URL que vous aurez précisé avec des informations sur l'objet modifié en corps de requête. Par exemple, lorsque le projet dont l'ID est 123456 change de statut :
    </p>

    <pre>POST https://my-application-domain.example.com/orfeo-webhook HTTP/1.1
    X-Orfeo-Signature: 465999d5fe880e8f877039937651708c571c9b0487797ebc39fbcb1ec3d90665
    Content-Type: application/json
    User-Agent: Orfeo API v1

    {
      "action": "project-status-update",
      "data": {
        "project_id": 123456,
        "old_status": {
          "pk": 222,
          "name": "À confirmer"
        },
        "new_status": {
          "pk": 223,
          "name": "Confirmé"
        }
      }
    }</pre>

    <p>
        L'en-tête <code>X-Orfeo-Signature</code> est la signature HMAC-SHA256 du corps de la requête, en utilisant la clé automatiquement générée au webhook, disponible via votre espace de configuration Orfeo. Cette signature vous permet d'authentifier les requêtes et vous assurer qu'elles proviennent bien de notre serveur. Veuillez faire attention à ce que <strong>la clé de signature reste secrète</strong>.
    </p>
paths:
  /api/accountingaccount/:
    get:
      operationId: List accountingaccount
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - accountingaccount
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccountingAccountList'
          description: ''
  /api/accountingaccount/{id}/:
    get:
      operationId: Retrieve accountingaccount
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this compte comptable.
        required: true
      tags:
      - accountingaccount
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingAccount'
          description: ''
  /api/accountingdocument/:
    get:
      operationId: List accountingdocument
      description: "An accounting document is a model regrouping invoices, credit
        notes and quotations of the organization.  \nYou can select a specific subset
        using the filter on `type`. Credit notes amounts are negative, to ease aggregations,
        but should be display to users using absolute values. Quotations should never
        have 'payments' lines, reserved to other types. "
      parameters:
      - in: query
        name: created_by
        schema:
          type: integer
        description: Filtre les résultats créés correspondant à l'identifiant (PK)
          de l'utilisateur
      - in: query
        name: creation_date
        schema:
          type: string
          format: date
        description: Filtre les résultats créés exactement à cette date
      - in: query
        name: creation_date__gt
        schema:
          type: string
          format: date
        description: Filtre les résultats créés après cette date
      - in: query
        name: creation_date__lt
        schema:
          type: string
          format: date
        description: Filtre les résultats créés avant cette date
      - in: query
        name: number
        schema:
          type: string
        description: Document number. The value can be 'DRAFT' for documents that
          have not been generated in Orfeo yet.
      - in: query
        name: ordering
        schema:
          type: array
          items:
            type: string
            enum:
            - -creation_date
            - -update_date
            - creation_date
            - update_date
        description: |-
          Trie les résultats selon le champ donné. Il est possible d'inverser le tri en préfixant le champ par un '-' (par exemple : -creation_date)

          * `creation_date` - Creation date
          * `-creation_date` - Creation date (décroissant)
          * `update_date` - Update date
          * `-update_date` - Update date (décroissant)
        explode: false
        style: form
      - in: query
        name: org_profile
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: paid
        schema:
          type: boolean
      - in: query
        name: type
        schema:
          type: string
          x-spec-enum-id: dab3830739bf6dd8
          enum:
          - creditnote
          - invoice
          - quotation
        description: |-
          * `invoice` - Facture
          * `quotation` - Devis
          * `creditnote` - Avoir
      - in: query
        name: update_date
        schema:
          type: string
          format: date
        description: Filtre les résultats mis à jour exactement à cette date
      - in: query
        name: update_date__gt
        schema:
          type: string
          format: date
        description: Filtre les résultats mis à jour après cette date
      - in: query
        name: update_date__lt
        schema:
          type: string
          format: date
        description: Filtre les résultats mis à jour avant cette date
      - in: query
        name: updated_by
        schema:
          type: integer
        description: Filtre les résultats mis à jour correspondant à l'identifiant
          (PK) de l'utilisateur
      tags:
      - accountingdocument
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccountingDocumentList'
          description: ''
  /api/accountingdocument/{id}/:
    get:
      operationId: Retrieve accountingdocument
      description: "An accounting document is a model regrouping invoices, credit
        notes and quotations of the organization.  \nYou can select a specific subset
        using the filter on `type`. Credit notes amounts are negative, to ease aggregations,
        but should be display to users using absolute values. Quotations should never
        have 'payments' lines, reserved to other types. "
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pièce comptable.
        required: true
      tags:
      - accountingdocument
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingDocument'
          description: ''
  /api/activity_status/:
    get:
      operationId: List activity_status
      description: |-
        List of status available for a given events. Statuses can described lifecycle of an event
        (to confirm, confirmed, cancelled...) and might serve to hide some events to artists, depending
        on `hide_to_artists` attribute.
      parameters:
      - in: query
        name: hide_to_artists
        schema:
          type: boolean
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: name__contains
        schema:
          type: string
        description: Filtre par nom (non sensible à la casse)
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - activity_status
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivityStatusList'
          description: ''
    post:
      operationId: Create activity_status
      description: |-
        List of status available for a given events. Statuses can described lifecycle of an event
        (to confirm, confirmed, cancelled...) and might serve to hide some events to artists, depending
        on `hide_to_artists` attribute.
      tags:
      - activity_status
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityStatus'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ActivityStatus'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ActivityStatus'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityStatus'
          description: ''
  /api/activity_status/{id}/:
    get:
      operationId: Retrieve activity_status
      description: |-
        List of status available for a given events. Statuses can described lifecycle of an event
        (to confirm, confirmed, cancelled...) and might serve to hide some events to artists, depending
        on `hide_to_artists` attribute.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this statut des éléments de
          planning.
        required: true
      tags:
      - activity_status
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityStatus'
          description: ''
    put:
      operationId: Update activity_status
      description: |-
        List of status available for a given events. Statuses can described lifecycle of an event
