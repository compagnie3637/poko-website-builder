        schema:
          type: array
          items:
            type: string
            enum:
            - -creation_date
            - -update_date
            - creation_date
            - update_date
        description: |-
          Trie les résultats selon le champ donné. Il est possible d'inverser le tri en préfixant le champ par un '-' (par exemple : -creation_date)

          * `creation_date` - Creation date
          * `-creation_date` - Creation date (décroissant)
          * `update_date` - Update date
          * `-update_date` - Update date (décroissant)
        explode: false
        style: form
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: update_date
        schema:
          type: string
          format: date
        description: Filtre les résultats mis à jour exactement à cette date
      - in: query
        name: update_date__gt
        schema:
          type: string
          format: date
        description: Filtre les résultats mis à jour après cette date
      - in: query
        name: update_date__lt
        schema:
          type: string
          format: date
        description: Filtre les résultats mis à jour avant cette date
      - in: query
        name: updated_by
        schema:
          type: integer
        description: Filtre les résultats mis à jour correspondant à l'identifiant
          (PK) de l'utilisateur
      tags:
      - activity_sub_type
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivitySubTypeList'
          description: ''
    post:
